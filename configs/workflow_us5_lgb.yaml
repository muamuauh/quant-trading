qlib_init:
    provider_uri: "./data/qlib_bin/us_data"
    region: us
market: &market us5
data_handler_config: &data_handler_config
    start_time: 2022-01-01
    end_time: 2026-05-23
    fit_start_time: 2022-01-01
    fit_end_time: 2024-05-31
    instruments: *market
port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 5
            n_drop: 1
    backtest:
        start_time: 2025-01-01
        end_time: 2026-05-23
        account: 100000
        exchange_kwargs:
            limit_threshold: null
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0005
            min_cost: 0
task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8879
            learning_rate: 0.05
            subsample: 0.8789
            # Loosened regularization (was 205/580) -- with 50 stocks the signal
            # is denser than in the 5-stock degenerate setup, so we let the
            # model fit more.
            lambda_l1: 80.0
            lambda_l2: 200.0
            # Deeper trees + more leaves for denser score distribution.
            # max_depth 8 caps leaves at 256; 128 gives the model room without
            # blowing past it.
            max_depth: 8
            num_leaves: 128
            num_threads: 4
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2022-01-01, 2024-05-31]
                valid: [2024-06-01, 2024-12-31]
                test:  [2025-01-01, 2026-05-23]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
